<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc">
  <title id="title">Guide pairing and PAM-dependent target recognition</title>
  <desc id="desc">Cas9 first recognizes a short PAM beside DNA, then the guide RNA pairs with an adjacent target sequence. Cleavage requires multiple recognition steps; complementarity alone is not the whole rule.</desc>
  <rect width="1000" height="520" rx="28" fill="#f5f1e8"/>
  <text x="55" y="68" font-family="Arial" font-size="30" font-weight="700" fill="#263238">Targeting is a sequence of checkpoints</text>
  <g transform="translate(70 135)">
    <path d="M0 105 H850" stroke="#3e6f9e" stroke-width="12" stroke-linecap="round"/>
    <path d="M0 165 H850" stroke="#2f6f5e" stroke-width="12" stroke-linecap="round"/>
    <g fill="#263238" font-family="monospace" font-size="21">
      <text x="225" y="90">5′— A C T G A C C T G A T C C G T A A C T G —</text>
      <text x="225" y="202">3′— T G A C T G G A C T A G G C A T T G A C —</text>
    </g>
    <rect x="690" y="66" width="120" height="138" rx="16" fill="#d46a55" opacity=".18" stroke="#d46a55" stroke-width="4"/>
    <text x="720" y="145" font-family="Arial" font-size="28" font-weight="700" fill="#d46a55">PAM</text>
    <path d="M265 270 H665" stroke="#d46a55" stroke-width="9" stroke-dasharray="18 10"/>
    <text x="320" y="312" font-family="Arial" font-size="22" fill="#263238">guide–target pairing region</text>
    <path d="M470 260 V190" stroke="#d46a55" stroke-width="4" marker-end="url(#arrow2)"/>
    <path d="M110 40 C30 60 30 220 110 245 C210 275 250 205 230 120 C215 55 170 30 110 40Z" fill="#2f6f5e"/>
    <text x="86" y="145" font-family="Arial" font-size="34" font-weight="700" fill="white">Cas9</text>
  </g>
  <g font-family="Arial" font-size="20" fill="#263238">
    <rect x="70" y="435" width="250" height="48" rx="12" fill="#3e6f9e" opacity=".17"/><text x="92" y="466">1 · compatible PAM nearby</text>
    <rect x="350" y="435" width="260" height="48" rx="12" fill="#2f6f5e" opacity=".17"/><text x="373" y="466">2 · sufficient RNA–DNA pairing</text>
    <rect x="640" y="435" width="290" height="48" rx="12" fill="#d46a55" opacity=".17"/><text x="663" y="466">3 · nuclease activation and cut</text>
  </g>
  <defs><marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0 L9 3 L0 6Z" fill="#d46a55"/></marker></defs>
</svg>
