<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc">
  <title id="title">CRISPR locus as a molecular memory record</title>
  <desc id="desc">A phage DNA fragment is captured as a new spacer beside a leader sequence. Alternating repeats and older spacers form the CRISPR array, emphasizing that spacers are sequence records of past encounters.</desc>
  <rect width="1000" height="520" rx="28" fill="#f5f1e8"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#263238">From encounter to sequence memory</text>
  <g transform="translate(70 120)">
    <path d="M35 70 C75 20 140 20 180 70 C140 120 75 120 35 70Z" fill="#d46a55" opacity=".2" stroke="#d46a55" stroke-width="4"/>
    <circle cx="108" cy="70" r="27" fill="#d46a55"/>
    <path d="M108 97 v55 M108 123 l-36 36 M108 123 l36 36" stroke="#d46a55" stroke-width="8" stroke-linecap="round"/>
    <text x="25" y="198" font-family="Arial" font-size="22" fill="#263238">phage encounter</text>
    <path d="M215 70 H335" stroke="#263238" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="345" y="43" width="105" height="54" rx="12" fill="#d46a55"/>
    <text x="367" y="78" font-family="Arial" font-size="20" font-weight="700" fill="white">fragment</text>
    <path d="M398 105 V175" stroke="#263238" stroke-width="5" marker-end="url(#arrow)"/>
  </g>
  <g transform="translate(70 330)">
    <rect x="0" y="0" width="140" height="72" rx="14" fill="#2f6f5e"/>
    <text x="35" y="44" font-family="Arial" font-size="22" font-weight="700" fill="white">leader</text>
    <rect x="155" y="0" width="70" height="72" rx="10" fill="#3e6f9e"/>
    <rect x="235" y="0" width="120" height="72" rx="10" fill="#d46a55"/>
    <rect x="365" y="0" width="70" height="72" rx="10" fill="#3e6f9e"/>
    <rect x="445" y="0" width="120" height="72" rx="10" fill="#e2b85b"/>
    <rect x="575" y="0" width="70" height="72" rx="10" fill="#3e6f9e"/>
    <rect x="655" y="0" width="120" height="72" rx="10" fill="#7e9f76"/>
    <rect x="785" y="0" width="70" height="72" rx="10" fill="#3e6f9e"/>
    <text x="170" y="44" font-family="Arial" font-size="17" fill="white">repeat</text>
    <text x="255" y="44" font-family="Arial" font-size="18" font-weight="700" fill="white">new spacer</text>
    <text x="462" y="44" font-family="Arial" font-size="18" fill="#263238">older spacer</text>
    <text x="674" y="44" font-family="Arial" font-size="18" fill="white">older spacer</text>
    <text x="170" y="108" font-family="Arial" font-size="19" fill="#263238">new records are often added near the leader → chronology, not a complete archive</text>
  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0 L9 3 L0 6Z" fill="#263238"/></marker></defs>
</svg>
