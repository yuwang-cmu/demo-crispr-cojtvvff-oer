<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600" role="img" aria-labelledby="title desc">
  <title id="title">Evidence ladder from molecular edit to supported biological claim</title>
  <desc id="desc">Six ascending steps move from reagent delivery through target-locus sequencing, allele frequencies, molecular function, phenotype, and causal interpretation. A parallel rail of controls and replication supports every step.</desc>
  <rect width="1000" height="600" rx="28" fill="#f5f1e8"/>
  <text x="55" y="68" font-family="Arial" font-size="30" font-weight="700" fill="#263238">“Edited” is the start of a claim, not the end</text>
  <g transform="translate(95 115)" font-family="Arial" font-size="18">
    <rect x="0" y="370" width="150" height="70" rx="12" fill="#3e6f9e"/><text x="22" y="402" fill="white" font-weight="700">1 · delivery</text><text x="22" y="428" fill="white">reagent present?</text>
    <rect x="135" y="300" width="165" height="140" rx="12" fill="#447c8d"/><text x="155" y="337" fill="white" font-weight="700">2 · locus</text><text x="155" y="366" fill="white">target changed?</text><text x="155" y="397" fill="white">which alleles?</text>
    <rect x="285" y="230" width="165" height="210" rx="12" fill="#2f6f5e"/><text x="305" y="267" fill="white" font-weight="700">3 · population</text><text x="305" y="296" fill="white">allele frequencies</text><text x="305" y="327" fill="white">and mosaicism</text>
    <rect x="435" y="160" width="165" height="280" rx="12" fill="#7e9f76"/><text x="455" y="197" fill="white" font-weight="700">4 · function</text><text x="455" y="226" fill="white">RNA, protein,</text><text x="455" y="257" fill="white">or activity changed?</text>
    <rect x="585" y="90" width="165" height="350" rx="12" fill="#e2b85b"/><text x="605" y="127" fill="#263238" font-weight="700">5 · phenotype</text><text x="605" y="156" fill="#263238">effect size, timing,</text><text x="605" y="187" fill="#263238">and variability</text>
    <rect x="735" y="20" width="165" height="420" rx="12" fill="#d46a55"/><text x="755" y="57" fill="white" font-weight="700">6 · causal claim</text><text x="755" y="86" fill="white">alternatives ruled out?</text><text x="755" y="117" fill="white">scope justified?</text>
    <rect x="0" y="465" width="900" height="58" rx="13" fill="#263238"/>
    <text x="70" y="501" fill="white" font-size="21">controls · orthogonal assays · biological replicates · blinded analysis · transparent uncertainty</text>
  </g>
</svg>
