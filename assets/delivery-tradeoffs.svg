<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">Delivery choices and their trade-offs</title>
  <desc id="desc">Three columns compare DNA expression constructs, RNA plus guide, and preassembled ribonucleoprotein. Arrows show that delivery changes onset, duration, cargo constraints, exposure, and cell stress, so it is part of the experimental design rather than a shipping detail.</desc>
  <rect width="1000" height="560" rx="28" fill="#f5f1e8"/>
  <text x="55" y="68" font-family="Arial" font-size="30" font-weight="700" fill="#263238">Delivery changes the experiment</text>
  <g transform="translate(55 115)" font-family="Arial">
    <g><rect width="275" height="310" rx="22" fill="#3e6f9e"/><text x="24" y="47" font-size="25" font-weight="700" fill="white">DNA construct</text><text x="24" y="86" font-size="18" fill="white">cell transcribes and translates</text><text x="24" y="126" font-size="18" fill="white">• slower onset</text><text x="24" y="160" font-size="18" fill="white">• potentially longer exposure</text><text x="24" y="194" font-size="18" fill="white">• convenient multiplexing</text><text x="24" y="228" font-size="18" fill="white">• integration concern varies</text><text x="24" y="276" font-size="17" fill="#f5f1e8">plasmid or viral vector</text></g>
    <g transform="translate(305)"><rect width="275" height="310" rx="22" fill="#2f6f5e"/><text x="24" y="47" font-size="25" font-weight="700" fill="white">mRNA + guide</text><text x="24" y="86" font-size="18" fill="white">translation precedes activity</text><text x="24" y="126" font-size="18" fill="white">• intermediate onset</text><text x="24" y="160" font-size="18" fill="white">• transient expression</text><text x="24" y="194" font-size="18" fill="white">• RNA handling matters</text><text x="24" y="228" font-size="18" fill="white">• innate responses can matter</text><text x="24" y="276" font-size="17" fill="#f5f1e8">lipid or physical delivery</text></g>
    <g transform="translate(610)"><rect width="275" height="310" rx="22" fill="#d46a55"/><text x="24" y="47" font-size="25" font-weight="700" fill="white">Cas–guide RNP</text><text x="24" y="86" font-size="18" fill="white">preassembled active complex</text><text x="24" y="126" font-size="18" fill="white">• rapid onset</text><text x="24" y="160" font-size="18" fill="white">• comparatively brief exposure</text><text x="24" y="194" font-size="18" fill="white">• no expression cassette</text><text x="24" y="228" font-size="18" fill="white">• cargo and uptake constraints</text><text x="24" y="276" font-size="17" fill="#f5f1e8">electroporation or particles</text></g>
  </g>
  <rect x="120" y="455" width="760" height="60" rx="16" fill="#263238"/>
  <text x="155" y="492" font-family="Arial" font-size="21" fill="white">Choose by cell type, target tissue, duration, cargo, toxicity, scale, and the claim you need to test.</text>
</svg>
